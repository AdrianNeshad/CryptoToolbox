<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0" id="meta-viewport">
    <meta property="og:image:type" content="image/png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="600">
    <meta property="og:title" content="BIP39 - Mnemonic Checksum Word Calculator">
    <script src="./bip39_english.js"></script>
    <script src="./calculator.js"></script>
    <script src="./dom.js"></script>
    <link rel="stylesheet" href="./style.css" />
    <title>BIP39 - Checksum Word Calculator</title>
</head>

<body>
    <main>

        <a href="../../Toolbox.html" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 6L9 12L15 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            Verktygslådan
        </a>

        <h1 style="font-size: 24px;">Checksum finder (BIP39)</h1>

        <div>
            <div class="seed-type-selector">
                <label for="seedType">Välj typ av Seed Phrase</label>
                <select id="seedType" onchange="onSeedTypeChange()">
                    <option value="bip39_12">BIP39 (12 ord)</option>
                    <option value="bip39_24">BIP39 (24 ord)</option>
                </select>
            </div>
        </div>

        <div>
            <textarea placeholder="Skriv 11 ord, separerade med blanksteg" oninput="onInput()">
        </textarea>
            <div class="validation display-none"></div>
        </div>
        
        <div class="result display-none">
            <div class="title"></div>
            <div class="list"></div>
        </div>

        <footer id="footer">
            <a href="https://github.com/AdrianNeshad/CryptoToolbox" target="_blank" rel="noopener">
                Github.com/AdrianNeshad/CryptoToolbox
            </a>
        </footer>

    </main>
</body>

</html>
